        <img class="main-image" src="https://ttarverlay.github.io/Hair.github.io/images/pressingcomb.png" alt="pressing comb">

        <textarea rows="20" cols="50">
Hot Comb (Pressing Comb)

Metal comb with wooden handle in a metal, heated dome, United States, early 20th century

The Hot Comb, commonly known as the Pressing Comb, is a tool that rose to popularity in the early 20th century for its ability to temporarily straighten tightly coiled hair textures, like 4c hair! Oftentimes left directly on the stove to heat, the hot comb did come with an additional attachment called the Pressing Comb stove.

The Pressing Comb Stove added a new layer of excitement to the hair world with the newfound ability to do hair in any space and not just the kitchen. Oil was wiped through the hair beforehand to protect the strands and scalp from damage, adding a pleasant odor to the air during haircare time! The Hot Comb was more than a grooming tool; it was a physical representation of the Social pressures that the Black Community faced to conform to a white, straight-haired society. In today's society, the Hot Comb stands strong as a pillar in the African American Hair Care industry and Culture!
        </textarea>

        <textarea rows="20" cols="50">

Agnes is a Cameroonian-American living in DC who has always had a passion for portraying natural hair as a true versatile art

Agnes Ashii, known as “The Black Hair Braider,” uses braiding as a way to tell stories about identity, memory, and culture. Her work connects generations, blending traditional techniques with personal expression to show how Black hair can hold history while also being a space for creativity and care.

    <section id="hairpic">

        <h1>Hair Pic With Black Power Fist!</h1>

        <img class="main-image" src="https://ttarverlay.github.io/Hair.github.io/images/hairpic.jpg" alt="hair pic">

        <textarea rows="20" cols="50">
The Afro Hair Pick came to popularity in the African American culture during the late 1960s and 1970s, as a prominent symbol of the natural hair movement and the Civil Rights Movement! Commonly worn in a “picked “ out from, the fist sits high in the sky, symbolizing Black Power and Pride. Typically designed with long metal teeth, the comb effortlessly glides through and shapes Afro-textured hair while maintaining the structure of the natural curl pattern. The pick was a visible symbol of Cultural Pride, understanding, and Resistance.
        </textarea>

        <h1>The Cultural Hair Show</h1>

        <img class="main-image" src="https://ttarverlay.github.io/Hair.github.io/images/hairshow.jpg" alt="hair show">

        <textarea rows="20" cols="50">
Cultural Black Hair Shows
Community, Craft, and Celebration

Emerging as vibrant community gatherings, Black hair shows have long served as spaces where artistry, entrepreneurship, and cultural pride converge. From local salons to large-scale stages, these events showcase intricate braiding, sculptural styling, and boundary-pushing techniques that transform hair into a powerful medium of expression.

More than spectacle, hair shows are sites of knowledge-sharing and affirmation—where stylists pass down techniques, audiences witness innovation, and Black beauty is celebrated on its own terms. In these spaces, hair becomes not just style, but story: a living expression of identity, creativity, and collective care.
        </textarea>

        <textarea rows="20" cols="50">
            The Museum of Afro Trichology is dedicated to preserving and uplifting the beauty, science, and cultural significance of hair across the African diaspora, honoring the full spectrum of textures, traditions, and expressions. Through storytelling, research, and community-centered exhibitions, the museum celebrates hair as a living archive of identity, resilience, and creativity across generations and geographies.
